name: CI

on:
  pull_request:
    branches:
      - main
    types: [opened, reopened, synchronize]

  push:
    branches:
      - main

jobs:
  server:
    name: Server tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: docker
          POSTGRES_PASSWORD: docker
          POSTGRES_DB: url_shortener_test
        options: >-
          --health-cmd "pg_isready -U docker -d url_shortener_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: server

    env:
      PORT: 3333
      NODE_ENV: test
      DATABASE_URL: postgresql://docker:docker@localhost:5432/url_shortener_test
      CLOUDFLARE_ACCOUNT_ID: ""
      CLOUDFLARE_ACCESS_KEY_ID: ""
      CLOUDFLARE_SECRET_ACCESS_KEY: ""
      CLOUDFLARE_BUCKET: ""
      CLOUDFLARE_PUBLIC_URL: https://example.com

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run db:migrate

      - name: Run tests
        run: npm test

      - name: Build server
        run: npm run build

  web:
    name: Web checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    env:
      VITE_BACKEND_URL: http://localhost:3333
      VITE_FRONTEND_URL: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build web
        run: npm run build
